name: Run Increase Index (Internal)
description: Execute the configured increase-index command.
inputs:
  increase-command:
    description: Shell command used to execute the index increase process.
    required: true
  working-directory:
    description: Directory where the command will run.
    required: false
    default: .
outputs:
  run-status:
    description: Execution status of increase index command.
    value: ${{ steps.execute.outputs.run-status }}
runs:
  using: composite
  steps:
    - id: execute
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INCREASE_COMMAND: ${{ inputs.increase-command }}
      run: |
        set -euo pipefail
        bash -euo pipefail -c "$INCREASE_COMMAND"
        echo "run-status=success" >> "$GITHUB_OUTPUT"
